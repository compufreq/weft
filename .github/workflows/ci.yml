name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-unit:
    name: Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --lib --bins

  rust-integration:
    name: Rust integration tests (Weaviate ${{ matrix.weaviate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Support policy: latest minor tested + best-effort floor.
        weaviate: ["1.30.1", "1.37.2"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Start Weaviate
        run: |
          docker run -d --name weaviate -p 8081:8080 -p 2112:2112 \
            -e AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true \
            -e PERSISTENCE_DATA_PATH=/var/lib/weaviate \
            -e DEFAULT_VECTORIZER_MODULE=none \
            -e ENABLE_MODULES=backup-filesystem \
            -e BACKUP_FILESYSTEM_PATH=/var/lib/weaviate/backups \
            -e CLUSTER_HOSTNAME=node1 \
            -e PROMETHEUS_MONITORING_ENABLED=true \
            cr.weaviate.io/semitechnologies/weaviate:${{ matrix.weaviate }} \
            --host 0.0.0.0 --port 8080 --scheme http
      - name: Start RBAC-enabled Weaviate (latest leg only)
        if: matrix.weaviate == '1.37.2'
        run: |
          docker run -d --name weaviate-rbac -p 8082:8080 \
            -e AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=false \
            -e AUTHENTICATION_APIKEY_ENABLED=true \
            -e AUTHENTICATION_APIKEY_ALLOWED_KEYS=rbac-admin-key \
            -e AUTHENTICATION_APIKEY_USERS=rbac-admin \
            -e AUTHENTICATION_DB_USERS_ENABLED=true \
            -e AUTHORIZATION_RBAC_ENABLED=true \
            -e AUTHORIZATION_RBAC_ROOT_USERS=rbac-admin \
            -e PERSISTENCE_DATA_PATH=/var/lib/weaviate \
            -e CLUSTER_HOSTNAME=rbacnode \
            cr.weaviate.io/semitechnologies/weaviate:${{ matrix.weaviate }} \
            --host 0.0.0.0 --port 8080 --scheme http
      - name: Seed demo data
        run: cargo run -p xtask -- seed
        env:
          WEAVIATE_URL: http://localhost:8081
      - name: Run integration tests
        run: cargo nextest run --workspace --test '*'
        env:
          WEAVIATE_URL: http://localhost:8081
          # Empty on the floor leg — the RBAC-management tests skip themselves.
          WEAVIATE_RBAC_URL: ${{ matrix.weaviate == '1.37.2' && 'http://localhost:8082' || '' }}
          WEAVIATE_RBAC_KEY: rbac-admin-key
      - name: Weaviate logs (on failure)
        if: failure()
        run: docker logs weaviate

  frontend:
    name: Frontend (lint + typecheck + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
